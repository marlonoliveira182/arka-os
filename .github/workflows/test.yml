name: Tests

on:
  push:
    branches: [master, main, v2]
  pull_request:
    branches: [master, main, v2]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pydantic rich click jinja2
          pip install pytest pytest-cov

      - name: Run Python tests
        run: python -m pytest tests/python/ -v --tb=short

      - name: Check test count
        run: |
          COUNT=$(python -m pytest tests/python/ --co -q 2>/dev/null | tail -1 | grep -o '[0-9]*')
          echo "Test count: $COUNT"
          if [ "$COUNT" -lt 500 ]; then
            echo "Warning: Expected 500+ tests, found $COUNT"
          fi

  bats-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: sudo apt-get update && sudo apt-get install -y bats jq

      - name: Make scripts executable
        run: |
          find . -name "*.sh" -exec chmod +x {} \;
          find bin/ -type f -exec chmod +x {} \; 2>/dev/null || true

      - name: Run bats tests
        run: bats tests/bats/ 2>/dev/null || bats tests/ 2>/dev/null || echo "No bats tests found"

  node-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate package.json
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"

      - name: Check installer syntax
        run: node --check installer/cli.js
