    role: Hook writing, thumbnail packaging, viral mechanics
  - agent_id: scriptwriter-joana
    role: Video/podcast scripts, narrative structure
  - agent_id: repurpose-distributor-nuno
    role: Content repurposing (1→30+), distribution, calendars

workflows:
  - workflow_id: content-viral
    trigger_command: "/content viral"
    tier: enterprise
  - workflow_id: content-script
    trigger_command: "/content script"
    tier: focused
  - workflow_id: content-system
    trigger_command: "/content system"
    tier: enterprise
  - workflow_id: content-repurpose
    trigger_command: "/content repurpose"
    tier: focused
  - workflow_id: content-youtube
    trigger_command: "/content youtube"
    tier: enterprise
