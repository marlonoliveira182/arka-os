    trigger_command: "/ops workflow"
    tier: focused
  - workflow_id: ops-sop
    trigger_command: "/ops sop"
    tier: specialist
  - workflow_id: ops-bottleneck
    trigger_command: "/ops bottleneck"
    tier: focused
  - workflow_id: ops-process-map
    trigger_command: "/ops process-map"
    tier: focused
  - workflow_id: ops-lean-audit
    trigger_command: "/ops lean-audit"
    tier: enterprise
